name: Build ASP.NET Framework + Docker

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: windows-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore packages
        run: nuget restore AspNetFrameworkDockerCICD.sln

      - name: Build project
        run: msbuild AspNetFrameworkDockerCICD.sln /p:Configuration=Release

      - name: Build Docker image
        run: docker build -t aspnetframeworkdockercicd .