name: Deploy ASP.NET Framework

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:

    runs-on: windows-latest

    steps:

      - uses: actions/checkout@v4

      - uses: microsoft/setup-msbuild@v2

      - uses: NuGet/setup-nuget@v2

      - name: Restore packages
        run: nuget restore AspNetFrameworkDockerCICD.sln

      - name: Build solution
        run: msbuild AspNetFrameworkDockerCICD.sln /p:Configuration=Release

      - name: Publish website
        run: |
          msbuild AspNetFrameworkDockerCICD\AspNetFrameworkDockerCICD.csproj `
          /p:Configuration=Release `
          /p:DeployOnBuild=true `
          /p:WebPublishMethod=FileSystem `
          /p:PublishUrl=published

      - name: List files after publish
        run: dir /s

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: YOUR_WEBAPP_NAME
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: published